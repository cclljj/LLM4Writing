<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:panel>
    <div class="chat-box">
        <div class="chat-box-author d-flex flex-wrap justify-end align-start gap-20">
            <div class="author-text-box d-flex align-center gap-15">
                <div class="d-flex align-center gap-10">
                    <button type="button" class="author-text-btn bd-tooltip-show">
                        <i class="ri-file-copy-line"></i>
                        <span class="bd-tooltip">Copy</span>
                    </button>
                </div>
                <div class="text" wicket:id="stmessage">Give me an article idea for a blog post</div>
            </div>
            <div class="author">
                <div class="author-thumb">
                    <img src="assets/images/avatar/main-user.webp" alt="user">
                </div>
            </div>
        </div>
    </div>
</wicket:panel>
</html>
