<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:extend>

    <div class="app-content-area">
        <div class="app-content-wrap app-gap-bottom">
            <div class="container">
                <div class="row gy-30 justify-between section-title-gap">
                    <div class="col-xl-8 col-lg-8">
                        <div class="bd-card-thumb-wrap d-flex align-center"
                             data-background="assets/images/bg/personal.webp">
                            <div class="bd-card-thumb-content">
                                <span class="bd-card-thumb-subtitle">Welcome Back</span>
                                <h1 class="bd-card-thumb-title mb-20"><span wicket:id="username"></span></h1>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row gy-30" id="Generate">
                    <div wicket:id="dataRepeater"
                         class="product-card col-xxl-4 col-xl-6 col-lg-6 col-md-6 wow bdFadeInUp" data-wow-duration="1s"
                         data-wow-delay=".2s">
                        <div class="bd-app-service-box light-effect">
                            <div class="service-icon"><img src="assets/images/app-service/image-generator-icon.svg"
                                                           alt="icon"></div>
                            <h4 class="title underline"><span wicket:id="title"></span></h4>
                            <p class="intro"><span wicket:id="groupname"></span></p>
                            <div class="bd-app-service-btn">
                                <a href="#" wicket:id="detailLink" class="bd-btn btn-outline-primary btn-small">
                                    進入討論
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- end app-content-area -->
</wicket:extend>
</html>
