<html xmlns:wicket="http://wicket.apache.org"
      xmlns="http://www.w3.org/1999/html">
<wicket:extend>
    <!-- Header -->
    <div class="app-content-area">
        <div class="app-content-wrap app-gap-bottom">
            <div class="container-fluid">
                <div class="row justify-center">
                    <div class="col-xl-12 col-lg-12 col-md-12">
                        <div class="app-breadcrumb-wrap d-flex-between flex-wrap align-center gap-15 section-title-gap-sm">
                            <h2 class="app-breadcrumb-title">作文題目管理</h2>
                        </div>
                    </div>
                </div>
                <!-- end page title -->

                <!-- Form row -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="header-title">查詢條件</h5>
                                <form wicket:id="queryForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="enable" class="form-label">啟用狀態</label>
                                            <select wicket:id="enable" id="enable"
                                                    class="selectize-drop-header nice-select app-profile-sorting"></select>
                                        </div>
                                    </div>
                                    <button wicket:id="btnQuery" type="submit"
                                            class="bd-btn btn-primary btn-small">
                                        查詢
                                    </button>
                                </form>
                                <div wicket:id="feedbackPanel" class="text-start mt-3"></div>
                            </div> <!-- end card-body -->

                        </div> <!-- end card-->
                    </div> <!-- end col -->
                </div>
                <!-- end row -->

                <div class="single-info" wicket:id="container">
                    <button wicket:id="btnAdd" type="button" class="bd-btn btn-primary btn-small">
                        新增主題
                    </button>
                    <div class="login-history-table table-responsive">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>序號</th>
                                <th>主題</th>
                                <th>類別</th>
                                <th>啟用狀態</th>
                                <th>動作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr wicket:id="data">
                                <td>
                                    <span wicket:id="serial"></span>
                                </td>
                                <td>
                                    <span wicket:id="essay_title"></span>
                                </td>
                                <td>
                                    <span wicket:id="essay_genre"></span>
                                </td>
                                <td>
                                    <span wicket:id="enable"></span>
                                </td>
                                <td>
                                    <button class="bd-btn btn-info btn-very-small" wicket:id="btnModified">修改
                                    </button>
                                    <!--                                    <button class="bd-btn btn-danger btn-very-small" wicket:id="btnDelete">刪除</button>-->
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div wicket:id="createEssayModal"></div>
                <div wicket:id="modifyEssayModal"></div>
                <div wicket:id="messageModal"></div>
            </div>
        </div>
    </div>
</wicket:extend>
</html>
