<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:extend>
    <!-- Start app-content-area -->
    <div class="app-content-area">
        <div class="app-content-wrap app-gap-bottom">
            <div class="container" wicket:id="container">
                <div class="table-responsive">
                    <table class="table table-centered table-hover mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>帳號</th>
                            <th>姓名</th>
                            <th>學校</th>
                            <th>角色</th>
                            <th>修改密碼</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr wicket:id="data">
                            <td><span wicket:id="no"></span></td>
                            <td><span wicket:id="account"></span></td>
                            <td><span wicket:id="name"></span></td>
                            <td><span wicket:id="school"></span></td>
                            <td><span wicket:id="role"></span></td>
                            <td>
                                <a wicket:id="btnResetPwd" class="action-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
                                        <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                                        <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
                                    </svg>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div wicket:id="pagingNavigator" class="basic-pagination mt-0 text-start"></div>
            </div>
        </div>
    </div>
    <!-- end app-content-area -->
    <wicket:panel wicket:id="resetPwdModal"/>
</wicket:extend>

</html>
