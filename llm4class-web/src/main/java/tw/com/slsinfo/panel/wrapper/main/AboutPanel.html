<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:panel>
    <!-- about area start -->
    <section class="bd-about-area section-gap">
        <div class="container">
            <div class="row gy-30 justify-between align-end">
                <div class="col-lg-4 col-md-6">
                    <div class="bd-about-content section-title-gap wow bdFadeInLeft" data-wow-duration="2s"
                         data-wow-delay=".1s">
                        <div class="bd-section-title-wrapper mb-30">
                            <h2 class="bd-section-title">About EkoAI</h2>
                            <p class="bd-section-intro">EkoAI is at the forefront of AI technology, offering innovative
                                solutions to help businesses scale and individuals excel.</p>
                        </div>
                        <div class="bd-about-btn">
                            <a class="bd-btn btn-gradient" href="about.html">Know More</a>
                        </div>
                    </div>
                    <div class="bd-about-thumb wow bdFadeInLeft" data-wow-duration="2s" data-wow-delay=".1s">
                        <img src="assets/images/about/about-image-001.webp" alt="campus">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 wow bdFadeInUp" data-wow-duration="2s" data-wow-delay=".1s">
                    <div class="bd-about-thumb">
                        <img src="assets/images/about/about-image-002.webp" alt="campus">
                    </div>
                </div>
                <div class="col-lg-4 col-md-12 wow bdFadeInRight" data-wow-duration="2s" data-wow-delay=".1s">
                    <div class="bd-about-thumb-group">
                        <div class="bd-about-thumb">
                            <img src="assets/images/about/about-image-003.webp" alt="campus">
                        </div>
                        <div class="bd-about-thumb">
                            <img src="assets/images/about/about-image-004.webp" alt="campus">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- about area end -->
</wicket:panel>
</html>
