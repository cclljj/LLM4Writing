<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:panel>
    <!-- partner area start -->
    <div class="bd-partner-area section-gap p-relative fix section-separator">
        <div class="section-glow-wrapper">
            <div class="section-glow"></div>
            <div class="section-glow glow-2"></div>
        </div>
        <div class="container">
            <div class="row gy-30 wow bdFadeInUp" data-wow-duration="1s" data-wow-delay=".2s">
                <div class="col-xl-4 col-lg-4 col-md-12">
                    <div class="bd-section-title-wrapper">
                        <h2 class="bd-section-title">Our Global Partners</h2>
                        <p class="bd-section-intro">We collaborate with leading companies and organizations to deliver
                            top-tier AI solutions across the globe.</p>
                    </div>
                </div>
                <div class="col-xl-7 col-lg-7 col-md-12">
                    <div class="bd-partner-wrapper">
                        <div class="bd-partner-box">
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-001.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-002.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-003.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-004.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-005.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-006.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-007.webp" alt="image">
                            </div>
                            <div class="bd-partner-item">
                                <img src="assets/images/partner/partner-img-008.webp" alt="image">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- partner area end -->
</wicket:panel>
</html>
