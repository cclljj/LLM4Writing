<html xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket-1.5.xsd;hb=master">
<wicket:panel>
    <!-- banner area start -->
    <section class="bd-hero-area p-relative fix">
        <div class="banner-shape">
            <img src="assets/images/shape/banner-shape.webp" alt="">
            <div class="bd-banner-glow"></div>
        </div>
        <div class="container">
            <div class="row justify-center wow bdFadeInUp" data-wow-duration="1s" data-wow-delay=".2s">
                <div class="col-xxl-10 col-xl-8 col-lg-10">
                    <div class="bd-banner-content cd-headline clip text-center">
                        <h1 class="bd-banner-title">Advanced AI
                            <br>
                            <span class="cd-words-wrapper">
                           <b class="is-visible">Image Generator</b>
                           <b class="is-hidden">Video Generator</b>
                           <b class="is-hidden">Code Generator</b>
                           <b class="is-hidden">Text Generator</b>
                           <b class="is-hidden">Email Generator</b>
                           <b class="is-hidden">Website Generator</b>
                        </span>
                            <br>
                            <span class="opacity-5">in Future</span>
                        </h1>
                        <p class="bd-banner-intro">Revolutionize your creativity with advanced AI tools for generating
                            images, videos, code, and more—effortlessly shaping the future.</p>
                        <div class="bd-banner-button">
                            <a class="bd-btn bg-light-gradient btn-medium" href="text-generator.html">
                                <div class="has-bg-light"></div>
                                <span>Start creating free</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- banner area end -->
</wicket:panel>
</html>
