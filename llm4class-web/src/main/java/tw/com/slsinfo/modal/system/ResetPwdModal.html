<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <div class="modal-header">
        <h4 class="modal-title" id="modalLabel">變更密碼</h4>
    </div>
    <div class="modal-body">
        <form wicket:id="formModal" class="px-3">
            <div class="form-group">
                <label for="newPassword">新密碼</label>
                <input wicket:id="newPassword" type="password" class="form-control" id="newPassword"
                       placeholder="請輸入新密碼">
            </div>
            <div class="form-group">
                <label for="newPassword2">密碼確認</label>
                <input wicket:id="newPassword2" type="password" class="form-control" id="newPassword2"
                       placeholder="請再次輸入密碼">
            </div>
            <div class="col-12">
                <div wicket:id="feedbackPanel"></div>
            </div>
            <div class="modal-footer">
                <button wicket:id="btnClose" type="button" class="btn btn-light" data-dismiss="modal">取消</button>
                <button wicket:id="submit" type="submit" class="btn btn-primary">確定</button>
            </div>
        </form>
    </div>
</wicket:panel>
</html>
