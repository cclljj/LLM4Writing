<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="modal-header">
        <h4 class="modal-title">建立新組別</h4>
        <button type="button" class="close-btn" onclick="hideModal()" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-body">
        <form wicket:id="form" class="group-form">
            <div class="form-group">
                <label for="groupNameInput" class="form-label">組別名稱：</label>
                <input
                        type="text"
                        wicket:id="groupname"
                        id="groupNameInput"
                        class="form-control"
                        placeholder="請輸入組別名稱"
                        required
                        maxlength="50"
                        autocomplete="off">
            </div>

            <div wicket:id="feedbackPanel" class="alert alert-danger" style="display: none;"></div>

            <div class="modal-footer">
                <button wicket:id="submit" type="submit" class="bd-btn btn-very-small btn-primary">
                    <span class="btn-icon">✓</span>
                    建立組別
                </button>
                <a wicket:id="cancelButton" href="#" class="bd-btn btn-very-small btn-secondary" onclick="hideModal(); return false;">
                    <span class="btn-icon">✕</span>
                    取消
                </a>
            </div>
        </form>
    </div>
</wicket:panel>
</html>
