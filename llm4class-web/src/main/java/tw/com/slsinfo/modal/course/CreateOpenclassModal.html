<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>

    <div class="modal-header">
        <h4 id="modalLabel" class="modal-title">新增班級</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <form wicket:id="formModal" class="px-3">
            <div class="row">
                <div class="col-md-12">
                    <div class="mb-3">
                        <label for="classname" class="form-label">班級名稱<span class="text-danger">*</span></label>
                        <input wicket:id="classname" type="text" class="form-control" id="classname">
                    </div>
                    <div class="mb-3">
                        <label for="essay" class="form-label">主題<span class="text-danger">*</span></label>
                        <select wicket:id="essay" id="essay"
                                class="form-control nice-select app-profile-sorting"></select>
                    </div>
                    <div class="mb-3">
                        <label for="discussiontime" class="form-label">討論時長<span
                                class="text-danger">*</span></label>
                        <input wicket:id="discussiontime" type="number" class="form-control" id="discussiontime">
                    </div>
                    <div class="mb-3">
                        <label for="supplementarytxt" class="form-label">資料補充</label>
                        <textarea wicket:id="supplementarytxt" rows="6"
                                  id="supplementarytxt"></textarea>
                    </div>
                </div>
            </div>
            <div class="col-md-12">
                <div class="mb-3">
                    <div wicket:id="feedbackPanel"></div>
                </div>
            </div>
            <div class="modal-footer">
                <!--                <button type="button" class="btn btn-light" data-dismiss="modal">取消</button>-->
                <button wicket:id="submit" type="submit" class="bd-btn btn-primary btn-small">確定</button>
            </div>
        </form>
    </div>

</wicket:extend>
</html>
