<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>
    <div class="modal-header">
        <h4 id="modalLabel" class="modal-title">新增主題</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <form wicket:id="formModal" class="px-3">
        <div class="modal-body">
            <div class="row">
                <div class="col-md-12">
                    <div class="mb-3">
                        <label for="title" class="form-label">主題<span class="text-danger">*</span></label>
                        <input wicket:id="title" type="text" class="form-control" id="title">
                    </div>
                    <div class="mb-3">
                        <label for="genreobject" class="form-label">類型<span class="text-danger">*</span></label>
                        <select wicket:id="genreobject" id="genreobject"
                                class="form-control nice-select app-profile-sorting"></select>
                    </div>
                    <div class="mb-3">
                        <label for="supplementarytxt" class="form-label">資料補充</label>
                        <textarea wicket:id="supplementarytxt" rows="6" id="supplementarytxt"
                                  class="form-control"></textarea>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="mb-3">
                        <div wicket:id="feedbackPanel"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button wicket:id="submit" type="submit" class="bd-btn btn-primary btn-small">確定</button>
        </div>
    </form>

</wicket:extend>
</html>
