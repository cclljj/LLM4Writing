<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>

    <div class="modal-header">
        <h4 class="modal-title">分組管理</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <div class="alert alert-info" role="alert">
            <i class="fas fa-info-circle me-2"></i>
            請設定各組別名稱並選擇成員，每個學生只能屬於一個組別。
        </div>

        <form wicket:id="groupForm">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">分組設定</h5>
                <button type="button" class="bd-btn btn-info btn-small" wicket:id="addGroupBtn">
                    <i class="fas fa-plus me-1"></i>新增分組
                </button>
            </div>

            <div wicket:id="groupContainer" class="group-container">
                <div wicket:id="groupList" class="group-item border rounded p-3 mb-3">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <label class="form-label">分組名稱</label>
                            <input wicket:id="groupName" type="text" class="form-control" placeholder="請輸入分組名稱">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">選擇成員</label>
                            <div wicket:id="selectedMembers" class="member-selection"></div>
                        </div>
                        <div class="col-md-1">
                            <button wicket:id="deleteBtn" type="button" class="btn btn-danger btn-sm" title="刪除分組">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="modal-footer">
        <button type="button" class="bd-btn btn-danger btn-small" wicket:id="cancelBtn">取消</button>
        <button type="button" class="bd-btn btn-success btn-small" wicket:id="saveBtn">
            <i class="fas fa-save me-1"></i>儲存分組
        </button>
    </div>

</wicket:extend>
</html>
