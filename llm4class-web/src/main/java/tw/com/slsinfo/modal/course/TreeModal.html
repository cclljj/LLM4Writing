<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>

    <div class="modal-header">
        <h4 class="modal-title" id="modalLabel">重點整理</h4>
    </div>
    <div class="modal-body">
        <div class="form-group">
            <div id="myDiagramDiv" style="width:100%; height:600px; border:1px solid black;"></div>
        </div>
        <div class="modal-footer">
            <button wicket:id="btnClose" type="button" class="btn btn-light" data-dismiss="modal">關閉</button>
        </div>
    </div>
</wicket:extend>
</html>
