<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title" id="courseDetailModalLabel">課程詳細資訊</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-12">
                    <!-- 課程標題 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">課程標題：</label>
                        <div class="form-control-plaintext border rounded p-2 bg-light">
                            <span wicket:id="courseTitle"></span>
                        </div>
                    </div>

                    <!-- 群組名稱 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">群組名稱：</label>
                        <div class="form-control-plaintext border rounded p-2 bg-light">
                            <span wicket:id="groupName"></span>
                        </div>
                    </div>

                    <!-- 組員名單 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">組員名單：</label>
                        <div class="form-control-plaintext border rounded p-2 bg-light">
                            <span wicket:id="groupmemberLabel"></span>
                        </div>
                    </div>

                    <!-- 課程說明 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">課程說明：</label>
                        <div class="form-control-plaintext border rounded p-3 bg-light"
                             style="max-height: 200px; overflow-y: auto; white-space: pre-wrap;">
                            <span wicket:id="courseDescription"></span>
                        </div>
                    </div>

                    <!-- 文章說明 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">文章說明：</label>
                        <div class="form-control-plaintext border rounded p-3 bg-light"
                             style="max-height: 200px; overflow-y: auto; white-space: pre-wrap;">
                            <span wicket:id="essayDescription"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-secondary bd-btn btn-info btn-very-small" wicket:id="cancelButton">
                <i class="fas fa-times"></i> 取消
            </button>
            <button type="button" class="btn-primary bd-btn btn-very-small" wicket:id="confirmButton">
                <i class="fas fa-play"></i> 開始學習
            </button>
        </div>
    </div>

</wicket:extend>
</html>
