<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:wicket="http://git-wip-us.apache.org/repos/asf/wicket/repo?p=wicket.git;a=blob_plain;f=wicket-core/src/main/resources/META-INF/wicket.xsd;hb=master"
      xml:lang="en" lang="en">
<wicket:extend>
    <!-- Body main wrapper start -->
    <main>

        <!-- error content area start -->
        <section class="bd-error-area bd-error-bg d-flex align-center justify-center fix"
                 data-background="assets/images/bg/error-bg.webp">
            <div class="container">
                <div class="row justify-center align-center">
                    <div class="col-xxl-6 col-xl-6 col-lg-8 col-md-12">
                        <div class="bd-error-wrapper text-center">
                            <h1 class="bd-error-heading-title">Session Timeout</h1>
                            <h2 class="bd-error-heading-subtitle">哇！Session已逾時！</h2>
                            <p class="bd-error-heading-intro">很抱歉，因為Session逾時的關係，您已被登出。</p>
                            <div class="error-btn">
                                <a href="home" wicket:id="homelink" class="bd-btn btn-gradient btn-large">回到首頁</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- error content area end -->

    </main>
    <!-- Body main wrapper end -->
</wicket:extend>
</html>
